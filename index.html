<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/iconweb.png" />
    <link rel="apple-touch-icon" href="/iconweb.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-title" content="BOOKOLAKA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f6fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#08101f" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="BOOKOLAKA - Sistem Peminjaman Kendaraan Dinas Operasional KPP Pratama Kolaka - Direktorat Jenderal Pajak" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="preload" as="image" href="/iconweb.png" />
    <link rel="preload" as="image" href="/logo.png" />
    <link rel="preload" as="image" href="/logocolor.png" />
    <link rel="preload" as="image" href="/djp.png" />
    <title>BOOKOLAKA - KPP Pratama Kolaka</title>
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('kdo_theme');
          if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
          } else if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: 0.92; }
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }
      #native-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #F0F0F0;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Native splash: simple spinner on white, shown before React loads -->
      <div id="native-splash">
        <div style="
          width: 40px; height: 40px;
          border: 4px solid rgba(21, 32, 71, 0.12);
          border-top-color: #1a2a5e;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite;
        "></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
